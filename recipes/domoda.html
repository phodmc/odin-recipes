    <h2>Description</h2>
    <p>
      Peanut stew or groundnut stew, also known as maafe, sauce d'arachide or
      tigadèguèna is a stew that is a staple food in Western Africa. It
      originates from the Mandinka and Bambara people of Mali.
    </p>

    <p>It is also known as `Domoda` in The Gambia</p>
